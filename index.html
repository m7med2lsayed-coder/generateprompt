        import { GoogleGenAI } from "@google/genai";

        // ---------- API Key Management ----------
        let aiClient = null;

        function saveApiKey() {
            const input = document.getElementById('apiKeyInput');
            const key = input.value.trim();
            if (key && key.startsWith('AIza')) {
                localStorage.setItem('gemini_api_key', key);
                updateApiStatus(true, key);
                initApiClient();
                alert("✅ تم حفظ المفتاح بنجاح!");
            } else {
                alert("❌ مفتاح غير صالح. يجب أن يبدأ بـ AIza");
            }
        }

        function updateApiStatus(hasKey, keyHint = '') {
            const statusSpan = document.getElementById('apiStatus');
            if (hasKey) {
                const short = keyHint.substring(0, 10) + '...';
                statusSpan.innerHTML = `🔑 مفعل: ${short}`;
                statusSpan.style.background = '#00b894';
            } else {
                statusSpan.innerHTML = `⚠️ لم يدخل بعد`;
                statusSpan.style.background = '#2c2c4a';
            }
        }

        function loadSavedKey() {
            const saved = localStorage.getItem('gemini_api_key');
            if (saved && saved.startsWith('AIza')) {
                document.getElementById('apiKeyInput').value = saved;
                updateApiStatus(true, saved);
                initApiClient();
            } else {
                updateApiStatus(false);
            }
        }

        async function initApiClient() {
            const key = localStorage.getItem('gemini_api_key');
            if (!key || !key.startsWith('AIza')) {
                console.warn("لا يوجد مفتاح صالح");
                aiClient = null;
                return false;
            }
            try {
                aiClient = new GoogleGenAI({ apiKey: key });
                console.log("✅ Gemini client initialized");
                return true;
            } catch(e) {
                console.error(e);
                aiClient = null;
                return false;
            }
        }

        // ---------- Enhanced System Instructions for each tool ----------
        const TOOL_SYSTEM_INSTRUCTIONS = {
            prompt_gen: `أنت "كبير مهندسي الأوامر" في Google. لديك خبرة 10 سنوات في صياغة أوامر (Prompts) احترافية لنماذج الذكاء الاصطناعي المتقدمة مثل Gemini وGPT وClaude.
مهمتك هي تحويل فكرة المستخدم إلى أمر (Prompt) استثنائي ومفصل.
اتبع التعليمات التالية بدقة لإنشاء الأمر:
1.  **تحليل الطلب**: قم أولاً بتحليل وصف الفكرة من المستخدم لفهم هدفه الأساسي، والسياق، والجمهور المستهدف.
2.  **صياغة الأمر**: قم بكتابة الأمر النهائي باللغة العربية الفصحى الحديثة. يجب أن يكون الأمر واضحًا، محددًا، وشاملًا. تجنب أي تعليمات عامة أو غامضة.
3.  **إضافة عناصر متقدمة**:
    *   حدد دوراً محدداً للنموذج (مثل "أنت مساعد محترف لكتابة المحتوى التسويقي")[reference:4].
    *   اذكر متطلبات التنسيق (مثل "استخدم قائمة نقطية"، "اكتب النتيجة في فقرات قصيرة"، "قدم مثالاً إذا أمكن").
    *   أضف قيودًا أو شروطًا (مثل "تجنب المصطلحات التقنية المعقدة"، "لا تذكر أي معلومات عن تاريخ الذكاء الاصطناعي").
4.  **التحقق من الجودة**: تأكد قبل الانتهاء من أن الأمر يحفز النموذج على تقديم إجابة "غنية بالمعلومات، ومنظمة بشكل جيد، وسهلة القراءة".

الآن، قم بتحويل الفكرة التالية إلى أمر احترافي. قم بإخراج الأمر مباشرة دون أي مقدمات.`,
            
            text_detector: `أنت خبير في تحليل النصوص والتمييز بين المحتوى البشري والمحتوى المُنشأ بالذكاء الاصطناعي (AI). مهمتك هي تحليل النص المُقدم وتحديد مصدره.
اتبع الخطوات التالية:
1.  **تحليل الخصائص**: ادرس النص بحثًا عن خصائص مثل السلاسة، العاطفة، الأخطاء الإملائية/النحوية، التكرار، والمنطق.
2.  **التصنيف**: بناءً على التحليل، صنف النص كواحد من التالي: ["من تأليف بشري", "من تأليف ذكاء اصطناعي", "غير واضح"].
3.  **تقديم تقرير**: اكتب تقريرًا قصيرًا ومنظمًا يشمل:
    *   **التصنيف:** [التصنيف الذي اخترته]

    *   **الأسباب الرئيسية:** اذكر 3 أسباب موجزة تدعم تصنيفك.

تجنب المقدمات والاستنتاجات العامة. ابدأ التقرير مباشرة.`,
            
            video_prompt: `أنت مهندس أوامر فيديو خبير في إنشاء أوصاف مفصلة وجاهزة لأنظمة مثل VEO3، Runway، وPika Labs. مهمتك هي تحويل وصف المستخدم إلى أمر فيديو احترافي.
اتبِع هذا القالب بدقة عند كتابة الأمر:
[المدة: ... ثانية] [الأسلوب: ...] [الإعداد/المشهد: ...] [الشخصيات/الأشياء الرئيسية: ...] [الحركة/التفاعل: ...] [الإضاءة والمزاج: ...]

- تأكد من أن الأمر بالكامل مكتوب باللغة العربية وبأسلوب سلس.

            image_prompt: `أنت مصمم أوامر صور احترافي لبرامج مثل Midjourney وDALL-E وImagen. مهمتك هي تحويل وصف المستخدم إلى أمر صورة دقيق وغني بالمعلومات.
اتبِع نظام "الإطار الذهبي" لإنشاء الأمر: [الموضوع] + [الوسط/الأسلوب الفني] + [التفاصيل البيئية/الخلفية] + [الإضاءة والجو] + [الإطار والزاوية] + [الكلمات المفتاحية للجودة]
- قم بتوسيع وتفصيل وصف المستخدم بشكل إبداعي. أضف تفاصيل عن الألوان، والمواد، والملمس، والجو العام.
- استخدم كلمات مفتاحية مثل "فائق الدقة"، "4k"، "تفاصيل واقعية" لتحسين الجودة حيثما كان ذلك مناسبًا.

            prompt_checker: `أنت مدقق أوامر (Prompt Checker) محترف. مهمتك هي تقييم الأمر المُقدم (prompt) بين قوسين --- من حيث فعاليته وجودته.
قم بتحليل الأمر وفقًا لهذه الأبعاد:
1.  **الوضوح والدقة**: هل الأمر خالٍ من الغموض ويحدد بدقة المهمة المطلوبة؟
2.  **الشمولية**: هل يوفر الأمر السياق الكافي (مثل الدور، الجمهور المستهدف، القيود، أمثلة) للحصول على أفضل نتيجة؟

بناءً على تحليلك، قم بكتابة تقرير تقييم باللغة العربية يتضمن:
*   **التقييم العام**: اذكر ما إذا كان الأمر "ضعيف"، "جيد"، أو "ممتاز".

النص المراد فحصه: --- {prompt} ---`,
            
            image_to_text: `أنت نظام متقدم لاستخراج النص من الصور (OCR)، ولكنك تفهم السياق أيضًا. ستحصل على صورة. مهمتك هي استخراج أي نص موجود فيها ووصفها بإيجاز.

1.  **النص المستخرج**: اكتب جميع النصوص التي تراها في الصورة بدقة، مع الحفاظ على التنسيق (مثل الفقرات والعناوين). إذا لم تجد نصًا، فقل "لا يوجد نص قابل للقراءة في هذه الصورة.".

ابدأ إجابتك مباشرة بعنوان "النص المستخرج:" ثم اعرض النص.`,

        // ---------- Core AI Execution Engine ----------
        async function callGemini(toolId, userInput, fileBase64 = null) {
            if (!aiClient) {
                const ok = await initApiClient();
                if (!ok) throw new Error("⚠️ يرجى إدخال مفتاح API صالح أولاً.");
            }

            let systemInstruction = TOOL_SYSTEM_INSTRUCTIONS[toolId] || TOOL_SYSTEM_INSTRUCTIONS.prompt_gen;
            
            let finalUserPrompt = "";
            if (toolId === 'prompt_checker') {
                finalUserPrompt = systemInstruction.replace('{prompt}', userInput);
                systemInstruction = "أنت مدقق أوامر محترف. قم بتحليل الأمر بين قوسين وتقديم تقرير كما هو مطلوب.";
            } else {
                finalUserPrompt = userInput;
            }

            let contents = finalUserPrompt;
            if (fileBase64 && (toolId === 'image_to_text' || toolId === 'image_to_prompt')) {
                contents = [
                    { text: finalUserPrompt },
                    { inlineData: { mimeType: "image/jpeg", data: fileBase64.split(',')[1] } }
                ];
            }

            try {
                const response = await aiClient.models.generateContent({
                    model: "gemini-3-flash-preview",
                    contents: contents,
                    config: {
                        systemInstruction: systemInstruction,
                        temperature: 0.7,
                        maxOutputTokens: 2000,
                    }
                });
                return response.text.trim();
            } catch (error) {
                console.error("Gemini API Error:", error);
                throw new Error("فشل الاتصال بـ Gemini API. يرجى التحقق من مفتاح API والمحاولة مرة أخرى.");
            }
        }

        async function executeTool(toolId, input, fileBase64 = null) {
            return await callGemini(toolId, input, fileBase64);
        }

        // ---------- Render Logic ----------
        const tools = [
            { id: "prompt_gen", name: "توليد الأوامر", icon: "fa-magic", desc: "حوّل أفكارك إلى أوامر احترافية", placeholder: "مثال: أريد أمراً لكتابة خطة تسويق..." },
            { id: "text_detector", name: "كاشف النصوص", icon: "fa-search", desc: "اكتشف إذا كان النص بشرياً أم AI", placeholder: "أدخل النص لتحليله..." },
            { id: "video_prompt", name: "توليد أوامر الفيديو", icon: "fa-video", desc: "لـ VEO3 ومولدات الفيديو", placeholder: "صف الفيديو (مشهد، أسلوب)..." },
            { id: "image_prompt", name: "توليد أوامر الصور", icon: "fa-image", desc: "أنشئ أوامر دقيقة لتوليد الصور", placeholder: "صف الصورة التي تريد..." },
            { id: "prompt_checker", name: "فحص الأوامر", icon: "fa-check-circle", desc: "تحقق من جودة أوامرك", placeholder: "ألصق الأمر المراد فحصه..." },
            { id: "image_to_text", name: "تحويل الصورة إلى نص", icon: "fa-file-image", desc: "استخراج النصوص من الصور (OCR)", placeholder: "ارفع صورة", hasFileUpload: true },
            { id: "image_to_prompt", name: "تحويل الصور إلى أوامر", icon: "fa-arrow-right-to-bracket", desc: "حول الصور إلى أوامر وصفية", placeholder: "ارفع صورة", hasFileUpload: true },
            { id: "paraphrase", name: "إعادة الصياغة", icon: "fa-pen-fancy", desc: "حوّل النصوص إلى أسلوب بشري", placeholder: "أدخل النص لإعادة صياغته..." },
            { id: "product_desc", name: "توليد وصف المنتجات", icon: "fa-tags", desc: "أوصاف احترافية للمنتجات", placeholder: "اسم المنتج وميزاته..." }
        ];

        let currentTool = "prompt_gen";

        function renderTool() {
            const tool = tools.find(t => t.id === currentTool);
            if (!tool) return;

            const container = document.getElementById('appContainer');
            container.innerHTML = `
                <div class="tool-card">
                    <div class="tool-header">
                        <i class="fas ${tool.icon}"></i>
                        <h2>${tool.name}</h2>
                    </div>
                    <div class="tool-desc">${tool.desc}</div>
                    <div class="input-group">
                        <label>${tool.hasFileUpload ? '📁 رفع صورة' : '✏️ أدخل النص'}</label>
                        ${!tool.hasFileUpload ? 
                            `<textarea id="toolInput" rows="5" placeholder="${tool.placeholder}"></textarea>` :
                            `<input type="file" id="fileInput" accept="image/*" style="background:#1e1e32;color:#fff;">
                             <div id="filePreview" style="margin-top:8px;font-size:0.8rem;color:#aaa;"></div>`
                        }
                    </div>
                    <button id="executeBtn" class="action-btn"><i class="fas fa-play"></i> تنفيذ</button>
                    <div id="resultArea" style="display:none;" class="result-box">
                        <div class="result-header">
                            <span><i class="fas fa-check-circle"></i> النتيجة</span>
                            <button id="copyResultBtn" class="copy-btn"><i class="far fa-copy"></i> نسخ</button>
                        </div>
                        <pre id="resultText"></pre>
                    </div>
                    <div id="loadingArea" style="display:none;" class="loading">
                        <div class="spinner"></div>
                        <p>جيمناي يحلل ويحسن طلبك ...</p>
                    </div>
                </div>
            `;

            document.getElementById('executeBtn').addEventListener('click', async () => {
                const loading = document.getElementById('loadingArea');
                const resultDiv = document.getElementById('resultArea');
                const executeBtn = document.getElementById('executeBtn');
                let input = "";
                let fileBase64 = null;

                if (!tool.hasFileUpload) {
                    input = document.getElementById('toolInput').value.trim();
                    if (!input) { alert("الرجاء إدخال النص"); return; }
                } else {
                    const fileInput = document.getElementById('fileInput');
                    const file = fileInput.files[0];
                    if (!file) { alert("الرجاء اختيار صورة"); return; }
                    input = "الصورة المرفوعة";
                    
                    const reader = new FileReader();
                    fileBase64 = await new Promise((resolve) => {
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                }

                loading.style.display = "block";
                resultDiv.style.display = "none";
                executeBtn.disabled = true;

                try {
                    const output = await executeTool(currentTool, input, fileBase64);
                    document.getElementById('resultText').innerText = output;
                    resultDiv.style.display = "block";
                } catch(e) {
                    alert("خطأ: " + e.message);
                } finally {
                    loading.style.display = "none";
                    executeBtn.disabled = false;
                }
            });

            const copyBtn = document.getElementById('copyResultBtn');
            if (copyBtn) {
                copyBtn.addEventListener('click', async () => {
                    const text = document.getElementById('resultText')?.innerText;
                    if (text) {
                        await navigator.clipboard.writeText(text);
                        copyBtn.innerHTML = '<i class="fas fa-check"></i> تم';
                        setTimeout(() => copyBtn.innerHTML = '<i class="far fa-copy"></i> نسخ', 1500);
                    }
                });
            }
        }

        function renderNav() {
            const nav = document.getElementById('toolsNav');
            nav.innerHTML = tools.map(t => `
                <button class="tool-nav-btn ${currentTool === t.id ? 'active' : ''}" data-tool="${t.id}">
                    <i class="fas ${t.icon}"></i> ${t.name.substring(0, 10)}
                </button>
            `).join('');

            document.querySelectorAll('.tool-nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentTool = btn.dataset.tool;
                    renderNav();
                    renderTool();
                });
            });
        }

        // Event Listeners for API Key
        document.getElementById('saveApiBtn').addEventListener('click', saveApiKey);
        window.addEventListener('load', () => {
            loadSavedKey();
            renderNav();
            renderTool();
        });

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
    </html>
