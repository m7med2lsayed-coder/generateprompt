<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TUT Fashion AI | أدوات ذكاء اصطناعي للأزياء</title>
    <!-- Google Fonts: خط أنيق وعصري -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TUT Fashion AI">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0A0A0A; /* أسود عميق */
            color: #FFFFFF;
            min-height: 100vh;
            direction: rtl;
        }

        /* تدرج خلفية دقيق أسود/ذهبي */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05), #0A0A0A 90%);
            z-index: -1;
        }

        /* Header - أنيق أسود مع لمسة ذهبية */
        .main-header {
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #D4AF37, #F5E6D3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.8rem;
            color: #000;
            box-shadow: 0 0 12px rgba(212,175,55,0.4);
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .logo-text span:first-child {
            color: #D4AF37;
        }
        .logo-text span:last-child {
            color: #FFFFFF;
            font-weight: 400;
        }
        .slogan {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #D4AF37;
            margin-top: 4px;
        }

        /* قسم API يندمج مع الألوان */
        .api-section {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(20,20,20,0.8);
            padding: 5px 15px;
            border-radius: 60px;
            border: 1px solid rgba(212,175,55,0.3);
            flex-wrap: wrap;
        }
        .api-section input {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 8px 12px;
            border-radius: 30px;
            color: #fff;
            font-family: 'Cairo';
            font-size: 0.8rem;
            width: 220px;
        }
        .api-section input:focus {
            border-color: #D4AF37;
            outline: none;
        }
        .api-section button {
            background: #D4AF37;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .api-section button:hover {
            background: #F5E6D3;
        }
        .api-status {
            font-size: 0.7rem;
            background: #2a2a2a;
            padding: 4px 10px;
            border-radius: 30px;
            color: #D4AF37;
        }

        /* شريط الأدوات */
        .tools-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
            justify-content: center;
        }
        .tool-nav-btn {
            background: rgba(30,30,30,0.9);
            border: 1px solid rgba(212,175,55,0.3);
            padding: 6px 14px;
            border-radius: 40px;
            color: #eee;
            cursor: pointer;
            font-family: 'Cairo';
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .tool-nav-btn.active {
            background: #D4AF37;
            color: #000;
            border-color: #D4AF37;
            font-weight: 600;
        }
        .tool-nav-btn:hover {
            background: #D4AF37;
            color: #000;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* بطاقة الأداة - أنيقة ومظلمة بلمسات ذهبية */
        .tool-card {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6);
            transition: transform 0.2s;
        }
        .tool-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.5);
        }
        .tool-header i {
            font-size: 2rem;
            color: #D4AF37;
        }
        .tool-header h2 {
            font-size: 1.7rem;
            font-weight: 600;
        }
        .tool-desc {
            color: #ccc;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #D4AF37;
        }
        textarea, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            border: none;
            background: #1e1e1e;
            color: #fff;
            font-family: 'Cairo';
            font-size: 1rem;
            outline: none;
            border: 1px solid #3a3a3a;
        }
        textarea:focus, input:focus {
            border-color: #D4AF37;
        }
        .action-btn {
            background: linear-gradient(95deg, #D4AF37, #F5E6D3);
            color: #000;
            font-weight: 800;
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Cairo';
            margin-top: 20px;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(212,175,55,0.3);
        }
        .action-btn:hover {
            transform: scale(0.98);
            background: #D4AF37;
        }
        .result-box {
            margin-top: 35px;
            background: #0a0a0a;
            border-radius: 24px;
            padding: 20px;
            border-right: 4px solid #D4AF37;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .copy-btn {
            background: #2a2a2a;
            border: 1px solid #D4AF37;
            padding: 6px 16px;
            border-radius: 30px;
            color: #D4AF37;
            cursor: pointer;
        }
        .copy-btn.success {
            background: #D4AF37;
            color: #000;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #0f0f0f;
            padding: 18px;
            border-radius: 20px;
            color: #F5E6D3;
            font-family: monospace;
            line-height: 1.5;
        }
        .loading {
            text-align: center;
            padding: 30px;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #2c2c2c;
            border-top: 4px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 25px;
            background: rgba(0,0,0,0.6);
            font-size: 0.8rem;
            border-top: 1px solid rgba(212,175,55,0.2);
            color: #aaa;
        }
        @media (max-width: 768px) {
            .tool-header h2 { font-size: 1.3rem; }
            .api-section input { width: 150px; }
            .logo-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="main-header">
    <div class="header-container">
        <div class="logo">
            <div class="logo-icon">T</div>
            <div>
                <div class="logo-text"><span>TUT</span> <span>FASHION</span></div>
                <div class="slogan">SIMPLICITY. QUALITY. IDENTITY.</div>
            </div>
        </div>
        <div class="api-section">
            <input type="text" id="apiKeyInput" placeholder="مفتاح Google Gemini API" autocomplete="off">
            <button id="saveApiBtn">حفظ</button>
            <span id="apiStatus" class="api-status">⚠️ مطلوب</span>
        </div>
    </div>
    <div class="tools-nav" id="toolsNav"></div>
</div>

<div class="container" id="appContainer"></div>

<div class="footer">
    <i class="fas fa-tshirt"></i> TUT FASHION AI | جميع الأدوات مجانية | مدعوم بـ Gemini API
</div>

<script type="importmap">
    {
        "imports": {
            "@google/genai": "https://esm.run/@google/genai"
        }
    }
</script>

<script type="module">
    import { GoogleGenAI } from "@google/genai";

    // ---------- إدارة مفتاح API ----------
    let aiClient = null;
    function saveApiKey() {
        const input = document.getElementById('apiKeyInput');
        const key = input.value.trim();
        if (key && key.startsWith('AIza')) {
            localStorage.setItem('gemini_api_key', key);
            updateApiStatus(true, key);
            initApiClient();
            alert("✅ تم حفظ مفتاح API بنجاح");
        } else {
            alert("❌ مفتاح غير صالح (يبدأ بـ AIza)");
        }
    }
    function updateApiStatus(hasKey, keyHint = '') {
        const span = document.getElementById('apiStatus');
        if (hasKey) {
            span.innerHTML = `🔑 مفعل ${keyHint.substring(0,8)}...`;
            span.style.background = '#D4AF37';
            span.style.color = '#000';
        } else {
            span.innerHTML = `⚠️ مطلوب مفتاح`;
            span.style.background = '#2a2a2a';
            span.style.color = '#D4AF37';
        }
    }
    function loadSavedKey() {
        const saved = localStorage.getItem('gemini_api_key');
        if (saved && saved.startsWith('AIza')) {
            document.getElementById('apiKeyInput').value = saved;
            updateApiStatus(true, saved);
            initApiClient();
        } else {
            updateApiStatus(false);
        }
    }
    async function initApiClient() {
        const key = localStorage.getItem('gemini_api_key');
        if (!key || !key.startsWith('AIza')) { aiClient = null; return false; }
        try {
            aiClient = new GoogleGenAI({ apiKey: key });
            return true;
        } catch(e) { aiClient = null; return false; }
    }

    // ---------- تعليمات النظام المتقدمة لكل أداة (لتحسين النتائج مثل generateprompt.ai) ----------
    const TOOL_SYSTEM_INSTRUCTIONS = {
        prompt_gen: `أنت مهندس أوامر خبير في Google. حول فكرة المستخدم إلى أمر (prompt) احترافي جداً، مفصّل، ويحتوي على سياق غني، مع تحديد دور النموذج، وتنسيق المخرجات، وأمثلة إن أمكن. اكتب الأمر بالعربية الفصحى.`,
        text_detector: `أنت خبير تحليل نصوص. حدد هل النص من تأليف بشري أم AI، مع نسبة ثقة  وأسباب موجزة.`,
        video_prompt: `أنت خبير أوامر فيديو لـ VEO3. أنشئ أمر فيديو احترافي يشمل المدة، الأسلوب، الإضاءة، والحركة.`,
        image_prompt: `أنت مصمم أوامر صور احترافي. أنشئ أمراً غنياً بالتفاصيل (موضوع، أسلوب، ألوان، إضاءة) لإنشاء صور فائقة الجودة.`,
        prompt_checker: `أنت مدقق أوامر. قم بتقييم الأمر (من 10) وقدم 3 اقتراحات ملموسة للتحسين.`,
        image_to_text: `أنت نظام OCR ذكي. استخرج النصوص من الصورة بدقة وقدم وصفاً بسيطاً للصورة.`,
        image_to_prompt: `أنت محلل صور. صف محتوى الصورة تفصيلياً وحوله إلى أمر (prompt) احترافي يمكن استخدامه لتوليد صور مشابهة.`,
        paraphrase: `أنت كاتب محترف. أعد صياغة النص بأسلوب بشري طبيعي، مع تغيير التراكيب والحفاظ على المعنى.`,
        product_desc: (input) => `أنت كاتب إعلانات. اكتب وصف منتج جذاب باستخدام تقنية AIDA (جذب انتباه، إثارة اهتمام، خلق رغبة، حث على الشراء). تفاصيل المنتج: ${input}`
    };

    async function callGemini(toolId, userPrompt, fileBase64 = null) {
        if (!aiClient) {
            const ok = await initApiClient();
            if (!ok) throw new Error("⚠️ يرجى إدخال مفتاح Google Gemini API أولاً.");
        }
        let systemInstruction = TOOL_SYSTEM_INSTRUCTIONS[toolId];
        if (toolId === 'product_desc') {
            systemInstruction = "اكتب وصف منتج احترافي وجذاب.";
            userPrompt = `المنتج: ${userPrompt}`;
        }
        let contents = userPrompt;
        if (fileBase64 && (toolId === 'image_to_text' || toolId === 'image_to_prompt')) {
            contents = [
                { text: userPrompt },
                { inlineData: { mimeType: "image/jpeg", data: fileBase64.split(',')[1] } }
            ];
        }
        const response = await aiClient.models.generateContent({
            model: "gemini-2.0-flash",  // نموذج مستقر ومجاني
            contents: contents,
            config: { systemInstruction: systemInstruction, temperature: 0.75, maxOutputTokens: 2000 }
        });
        return response.text.trim();
    }

    async function executeTool(toolId, input, fileBase64 = null) {
        return await callGemini(toolId, input, fileBase64);
    }

    // ---------- قائمة الأدوات التسعة ----------
    const tools = [
        { id: "prompt_gen", name: "توليد الأوامر", icon: "fa-magic", desc: "حوّل أفكارك إلى أوامر احترافية للذكاء الاصطناعي", placeholder: "مثال: اكتب لي أمراً لإنشاء خطة تسويق..." },
        { id: "text_detector", name: "كاشف النصوص", icon: "fa-search", desc: "اكتشف إذا كان النص بشرياً أم من تأليف AI", placeholder: "ألصق النص الذي تريد تحليله..." },
        { id: "video_prompt", name: "أوامر الفيديو", icon: "fa-video", desc: "اصنع مقاطع فيديو احترافية باستخدام VEO3", placeholder: "صف الفيديو الذي تحلم به (حركة، مشاهد، أسلوب)..." },
        { id: "image_prompt", name: "أوامر الصور", icon: "fa-image", desc: "أنشئ صوراً مذهلة بأوامر دقيقة", placeholder: "تفاصيل الصورة المطلوبة..." },
        { id: "prompt_checker", name: "فحص الأوامر", icon: "fa-check-circle", desc: "تقييم جودة أوامرك وتحسينها", placeholder: "الصق الأمر المراد فحصه..." },
        { id: "image_to_text", name: "الصورة إلى نص", icon: "fa-file-image", desc: "استخرج النصوص من أي صورة (OCR)", placeholder: "ارفع صورة تحتوي على نص", hasFileUpload: true },
        { id: "image_to_prompt", name: "الصورة إلى أمر", icon: "fa-arrow-right-to-bracket", desc: "حول أي صورة إلى أمر وصفي احترافي", placeholder: "ارفع صورة لتحليلها", hasFileUpload: true },
        { id: "paraphrase", name: "إعادة الصياغة", icon: "fa-pen-fancy", desc: "اجعل النصوص أكثر طبيعية وإنسانية", placeholder: "أدخل النص لإعادة صياغته..." },
        { id: "product_desc", name: "وصف المنتجات", icon: "fa-tags", desc: "أوصاف تسويقية للمنتجات (خاصة الأزياء)", placeholder: "اسم المنتج ونوعه (تيشيرت، بنطلون) والميزات..." }
    ];

    let currentTool = "prompt_gen";

    function renderTool() {
        const tool = tools.find(t => t.id === currentTool);
        if (!tool) return;
        const container = document.getElementById('appContainer');
        container.innerHTML = `
            <div class="tool-card">
                <div class="tool-header">
                    <i class="fas ${tool.icon}"></i>
                    <h2>${tool.name}</h2>
                </div>
                <div class="tool-desc">${tool.desc}</div>
                <div class="input-group">
                    <label>${tool.hasFileUpload ? '📸 رفع صورة' : '✍️ أدخل النص'}</label>
                    ${!tool.hasFileUpload ? 
                        `<textarea id="toolInput" rows="5" placeholder="${tool.placeholder}"></textarea>` :
                        `<input type="file" id="fileInput" accept="image/*" style="background:#1e1e1e;">
                         <div id="preview" style="margin-top:8px; color:#D4AF37; font-size:0.8rem;"></div>`
                    }
                </div>
                <button id="executeBtn" class="action-btn"><i class="fas fa-gem"></i> تنفيذ الأمر</button>
                <div id="resultArea" style="display:none;" class="result-box">
                    <div class="result-header">
                        <span><i class="fas fa-crown"></i> النتيجة</span>
                        <button id="copyBtn" class="copy-btn"><i class="far fa-copy"></i> نسخ</button>
                    </div>
                    <pre id="resultText"></pre>
                </div>
                <div id="loadingArea" style="display:none;" class="loading">
                    <div class="spinner"></div>
                    <p>جيمناي بصياغة أفضل استجابة ...</p>
                </div>
            </div>
        `;
        // الأحداث
        document.getElementById('executeBtn').addEventListener('click', async () => {
            const loadingDiv = document.getElementById('loadingArea');
            const resultDiv = document.getElementById('resultArea');
            const btn = document.getElementById('executeBtn');
            let inputVal = "", fileBase64 = null;
            if (!tool.hasFileUpload) {
                inputVal = document.getElementById('toolInput').value.trim();
                if (!inputVal) { alert("الرجاء إدخال نص"); return; }
            } else {
                const file = document.getElementById('fileInput').files[0];
                if (!file) { alert("اختر صورة"); return; }
                inputVal = "الصورة المرفوعة";
                const reader = new FileReader();
                fileBase64 = await new Promise(r => { reader.onloadend = () => r(reader.result); reader.readAsDataURL(file); });
            }
            loadingDiv.style.display = "block";
            resultDiv.style.display = "none";
            btn.disabled = true;
            try {
                const output = await executeTool(currentTool, inputVal, fileBase64);
                document.getElementById('resultText').innerText = output;
                resultDiv.style.display = "block";
            } catch (err) {
                alert("خطأ: " + err.message);
            } finally {
                loadingDiv.style.display = "none";
                btn.disabled = false;
            }
        });
        const copyButton = document.getElementById('copyBtn');
        if (copyButton) {
            copyButton.addEventListener('click', async () => {
                const text = document.getElementById('resultText').innerText;
                if (text) {
                    await navigator.clipboard.writeText(text);
                    copyButton.innerHTML = '<i class="fas fa-check"></i> تم';
                    copyButton.classList.add('success');
                    setTimeout(() => { copyButton.innerHTML = '<i class="far fa-copy"></i> نسخ'; copyButton.classList.remove('success'); }, 1500);
                }
            });
        }
    }

    function renderNav() {
        const nav = document.getElementById('toolsNav');
        nav.innerHTML = tools.map(t => `<button class="tool-nav-btn ${currentTool === t.id ? 'active' : ''}" data-tool="${t.id}"><i class="fas ${t.icon}"></i> ${t.name}</button>`).join('');
        document.querySelectorAll('.tool-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTool = btn.dataset.tool;
                renderNav();
                renderTool();
            });
        });
    }

    // تحميل أولي
    document.getElementById('saveApiBtn').addEventListener('click', saveApiKey);
    window.addEventListener('load', () => {
        loadSavedKey();
        renderNav();
        renderTool();
    });
    // Service Worker للتثبيت
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(e => console.log("SW error", e));
        });
    }
</script>
</body>
</html>
